<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Fee Payments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <script type="module">
    import { SCHOOL } from './js/school-config.js';
    document.title = `Fee Payments | ${SCHOOL.name}`;
  </script>
</head>
<body>
<div class="app-shell">
  <main class="main-content">
    <div id="alertContainer"></div>

    <div class="page-title-row">
      <div>
        <h1 class="page-title">Fee Payments</h1>
        <p class="page-subtitle">Record and track incoming fee payments</p>
      </div>
    </div>

    <!-- Search -->
    <div class="card">
      <h2>Search Learner</h2>
      <p class="text-muted mb-20" style="font-size:.85rem;">Start typing to search by name or admission number</p>
      <div class="autocomplete-container">
        <input type="text" id="searchInput" class="search-input-large" placeholder="Type learner name or admission number…" autocomplete="off"/>
        <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
      </div>
      <div id="learnerDetails" class="mt-20 hidden"></div>
    </div>

    <!-- Payment form -->
    <div class="card hidden" id="paymentCard">
      <div class="card-header">
        <h2>Record Payment</h2>
        <button type="button" id="nextLearnerBtn" class="btn btn-secondary">Next Learner</button>
      </div>
      <form id="paymentForm">
        <div class="grid-2">
          <div><input type="date" id="paymentDate" required/></div>
          <div><input type="text" id="referenceNo" placeholder="Reference No (optional)"/></div>
          <div style="grid-column:1/-1;"><input type="number" id="amountPaid" placeholder="Amount Paid (KES)" min="1" required/></div>
        </div>
        <button type="submit" id="paymentBtn">Save Payment</button>
      </form>
    </div>

    <!-- History -->
    <div class="card hidden" id="historyCard">
      <h2>Payment History</h2>
      <div class="table-wrap" style="max-height:360px;overflow-y:auto;">
        <table>
          <thead style="position:sticky;top:0;z-index:10;background:var(--bg);">
            <tr><th>Date</th><th>Reference No</th><th>Amount (KES)</th><th style="text-align:center;">Actions</th></tr>
          </thead>
          <tbody id="paymentHistory"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Edit Payment Modal -->
<div class="modal hidden" id="editPaymentModal">
  <div class="modal-content" style="max-width:440px;">
    <h2 class="modal-title">Edit Payment</h2>
    <p class="modal-subtitle">Correct the payment date, reference number or amount.</p>
    <form id="editPaymentForm">
      <input type="hidden" id="editPaymentId"/>
      <label style="display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">Payment Date</label>
      <input type="date" id="editPaymentDate" required/>
      <label style="display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;margin-top:4px;">Reference No</label>
      <input type="text" id="editReferenceNo" placeholder="Reference No (optional)"/>
      <label style="display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;margin-top:4px;">Amount (KES)</label>
      <input type="number" id="editAmount" placeholder="Amount" min="1" required/>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="button" id="cancelEditPaymentBtn" class="btn btn-secondary" style="flex:1;">Cancel</button>
        <button type="submit" id="saveEditPaymentBtn" class="btn btn-primary" style="flex:1;">Save Changes</button>
      </div>
    </form>
  </div>
</div>
<script type="module">
  import { injectShell } from "./js/sidebar.js";
  injectShell({ pageTitle: 'Fee Payments', activePage: 'payments' });
</script>
<script type="module" src="js/payments.js"></script>
</body>
</html>
