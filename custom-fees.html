<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Fees | Little Angels Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-shell">
  <main class="main-content">
    <div id="alertContainer"></div>

    <div class="page-title-row">
      <div>
        <h1 class="page-title">Custom Fee Adjustments</h1>
        <p class="page-subtitle">Manage sponsorships and special fee arrangements</p>
      </div>
    </div>

    <!-- Search learner -->
    <div class="card">
      <h2>Find Learner</h2>
      <p class="text-muted mb-20" style="font-size:.85rem;">Search to apply custom fees for sponsored learners or special arrangements</p>
      <div class="autocomplete-container">
        <input type="text" id="searchInput" class="search-input-large" placeholder="Type learner name or admission number…" autocomplete="off"/>
        <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
      </div>
      <div id="learnerDetails" class="mt-20 hidden"></div>
    </div>

    <!-- Custom fee form -->
    <div class="card hidden" id="customFeeCard">
      <div class="card-header">
        <h2>Set Custom Fee</h2>
        <button type="button" id="nextLearnerBtn" class="btn btn-secondary">Next Learner</button>
      </div>
      <form id="customFeeForm">
        <div style="background:var(--bg);padding:16px;border-radius:var(--radius-xs);margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:.72rem;color:var(--text-secondary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;">Class Fee</div>
            <div id="classFee" style="font-size:1.25rem;font-weight:700;color:var(--text-primary);font-family:'Cormorant Garamond',serif;"></div>
          </div>
          <div>
            <div style="font-size:.72rem;color:var(--text-secondary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;">Current Custom Fee</div>
            <div id="currentCustomFee" style="font-size:1.25rem;font-weight:700;color:var(--navy2);font-family:'Cormorant Garamond',serif;"></div>
          </div>
        </div>
        <select id="feeType" required>
          <option value="">Select Adjustment Type</option>
          <option value="full_sponsorship">Full Sponsorship (Free)</option>
          <option value="partial_sponsorship">Partial Sponsorship</option>
          <option value="custom_amount">Custom Amount</option>
          <option value="remove_custom">Remove Custom Fee</option>
        </select>
        <div id="customAmountSection" class="hidden">
          <input type="number" id="customAmount" placeholder="Custom Fee Amount (KES)" min="0"/>
        </div>
        <div id="reasonSection" class="hidden">
          <textarea id="feeReason" placeholder="Reason / Notes (e.g. Sponsored by XYZ Foundation)" rows="3" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-family:'DM Sans',sans-serif;resize:vertical;outline:none;"></textarea>
        </div>
        <button type="submit" id="saveFeeBtn" class="mt-20">Save Custom Fee</button>
      </form>
    </div>

    <!-- Custom fees list -->
    <div class="card">
      <div class="card-header">
        <h2>Active Custom Fees</h2>
        <div style="display:flex;gap:10px;">
          <select id="classFilterCustom" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.84rem;outline:none;margin-bottom:0;width:auto;"><option value="">All Classes</option></select>
          <select id="typeFilter" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:.84rem;outline:none;margin-bottom:0;width:auto;">
            <option value="">All Types</option>
            <option value="full_sponsorship">Full Sponsorship</option>
            <option value="partial_sponsorship">Partial Sponsorship</option>
            <option value="custom_amount">Custom Amount</option>
          </select>
        </div>
      </div>
      <div id="loadingCustomFees" class="text-muted text-center">Loading…</div>
      <div id="customFeesTableWrapper" class="hidden">
        <div class="table-wrap">
          <table id="customFeesTable">
            <thead><tr><th>Adm No</th><th>Name</th><th>Class</th><th>Class Fee</th><th>Custom Fee</th><th>Type</th><th>Reason</th><th>Action</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script type="module">
  import { injectShell } from "./js/sidebar.js";
  injectShell({ pageTitle: 'Custom Fee Adjustments', activePage: 'custom-fees' });
</script>
<script type="module" src="js/custom-fees.js"></script>
</body>
</html>
