<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Angels Academy | School Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="manifest" href="pwa/manifest.json" />
  <meta name="theme-color" content="#1a3a5c" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ──────────────────────────────────────────────
       ROOT TOKENS
    ────────────────────────────────────────────── */
    :root {
      --navy:    #0f2847;
      --navy2:   #1a3a5c;
      --gold:    #c9a84c;
      --gold2:   #e8c96a;
      --cream:   #fdf8f0;
      --glass-bg: rgba(255,255,255,0.09);
      --glass-border: rgba(255,255,255,0.18);
      --text-light: rgba(255,255,255,0.92);
      --text-dim:   rgba(255,255,255,0.55);
      --error-col:  #ff6b6b;
      --success-col:#4ade80;
    }

    /* ──────────────────────────────────────────────
       RESET & BASE
    ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--navy);
    }

    /* ──────────────────────────────────────────────
       ANIMATED BACKGROUND
    ────────────────────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Deep gradient base */
    .bg-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 20% 10%, #1a3f6f 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 80% 90%, #0d2240 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0f2847 0%, #071828 100%);
    }

    /* Slow golden shimmer */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 20%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 15% 75%, rgba(201,168,76,0.08) 0%, transparent 55%);
      animation: shimmer 14s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { opacity: 0.6; transform: scale(1) translateY(0); }
      50%  { opacity: 1;   transform: scale(1.04) translateY(-8px); }
      100% { opacity: 0.7; transform: scale(1.01) translateY(4px); }
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0;
      animation: floatOrb var(--dur, 20s) ease-in-out infinite;
    }
    .orb-1 { width: 420px; height: 420px; background: rgba(201,168,76,0.08); top: -100px; left: -80px; --dur: 22s; animation-delay: 0s; }
    .orb-2 { width: 320px; height: 320px; background: rgba(26,58,92,0.5); bottom: -60px; right: -60px; --dur: 18s; animation-delay: -8s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(201,168,76,0.06); top: 40%; right: 10%; --dur: 25s; animation-delay: -4s; }

    @keyframes floatOrb {
      0%   { opacity: 0; transform: translate(0, 0) scale(1); }
      10%  { opacity: 1; }
      50%  { transform: translate(30px, -40px) scale(1.1); }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translate(0, 0) scale(1); }
    }

    /* Starfield */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 35% 70%, rgba(201,168,76,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 80%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 25%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.2) 0%, transparent 100%);
      animation: twinkle 6s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: 0.6; }
      50%  { opacity: 1; }
      100% { opacity: 0.7; }
    }


    /* ──────────────────────────────────────────────
       CARD WRAPPER
    ────────────────────────────────────────────── */
    .login-scene {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Glass card */
    .login-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow:
        0 32px 64px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 1px 0 rgba(255,255,255,0.12) inset;
      padding: 48px 44px 40px;
      position: relative;
      overflow: hidden;
    }

    /* Top glow bar */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.7), transparent);
    }

    /* Corner accent */
    .login-card::after {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ──────────────────────────────────────────────
       CREST / EMBLEM
    ────────────────────────────────────────────── */
    .crest {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .crest-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 24px rgba(201,168,76,0.15), inset 0 0 12px rgba(201,168,76,0.06);
    }

    .crest-ring::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.2);
    }

    .crest-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.5));
    }

    /* ──────────────────────────────────────────────
       HEADLINE
    ────────────────────────────────────────────── */
    .headline {
      text-align: center;
      margin-bottom: 36px;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    .headline h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.95rem;
      color: var(--text-light);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px auto;
      max-width: 280px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.4));
    }
    .divider-line.right {
      background: linear-gradient(to left, transparent, rgba(201,168,76,0.4));
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    .headline .motto {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.92rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      margin-top: 10px;
    }

    /* ──────────────────────────────────────────────
       FORM
    ────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 18px;
      position: relative;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) var(--delay, 0.2s) both;
    }

    .form-group:nth-child(1) { --delay: 0.22s; }
    .form-group:nth-child(2) { --delay: 0.28s; }

    .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.75);
      margin-bottom: 8px;
    }

    /* ── Field wrapper: fixed height, stacking context ── */
    .field-wrap {
      position: relative;
      height: 50px;              /* single source of truth for all heights */
    }

    /* ── Icon: absolutely fills left column, uses flex to dead-centre the SVG ── */
    .field-icon {
      position: absolute;
      left: 0;
      top: 0;
      width: 48px;
      height: 100%;             /* inherits wrapper height — no top/bottom math */
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.5;
      transition: opacity 0.25s;
      z-index: 2;               /* sits above the input so autofill can't bury it */
    }

    .field-icon svg {
      display: block;
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .field-wrap:focus-within .field-icon {
      opacity: 0.9;
    }

    /* ── Input: fills the wrapper, padding carves space for icons ── */
    .field-input {
      position: absolute;        /* sit inside wrapper at exact wrapper dimensions */
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 0 16px 0 48px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      outline: none;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      -webkit-appearance: none;
      box-sizing: border-box;
      /* Vertically centred text via flex internals on modern browsers */
      display: flex;
      align-items: center;
      z-index: 1;
    }

    .field-input::placeholder {
      color: rgba(255,255,255,0.30);
      font-size: 0.88rem;
      font-weight: 300;
    }

    /* Password right-padding for eye toggle */
    #password.field-input {
      padding-right: 48px;
    }

    .field-input:focus {
      background: rgba(255,255,255,0.11);
      border-color: rgba(201,168,76,0.55);
      box-shadow:
        0 0 0 3px rgba(201,168,76,0.10),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ── Autofill override: prevent browser gold/blue wash from covering icons ──
       WebKit injects an inset box-shadow and changes text colour on autofill.
       We override both so the input stays dark and the icons (z-index:2) stay visible. */
    .field-input:-webkit-autofill,
    .field-input:-webkit-autofill:hover,
    .field-input:-webkit-autofill:focus,
    .field-input:-webkit-autofill:active {
      -webkit-box-shadow:
        0 0 0 1000px rgba(15, 40, 71, 0.85) inset,  /* dark fill — matches card bg */
        0 0 0 1px rgba(201,168,76,0.3);              /* subtle gold border hint */
      box-shadow:
        0 0 0 1000px rgba(15, 40, 71, 0.85) inset,
        0 0 0 1px rgba(201,168,76,0.3);
      -webkit-text-fill-color: rgba(255,255,255,0.92) !important; /* keep text light */
      caret-color: rgba(255,255,255,0.92);
      border-color: rgba(201,168,76,0.35) !important;
      transition: background-color 9999s ease-in-out 0s; /* delay browser colour takeover */
    }

    /* ── Password toggle: mirrors icon — same height, right side ── */
    .pwd-toggle {
      position: absolute;
      right: 0;
      top: 0;
      width: 48px;
      height: 100%;             /* inherits wrapper height */
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.40;
      transition: opacity 0.2s;
      padding: 0;
      color: white;
      z-index: 2;               /* above input so autofill can't cover it */
    }

    .pwd-toggle svg {
      display: block;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .pwd-toggle:hover { opacity: 0.8; }

    /* ──────────────────────────────────────────────
       REMEMBER / FORGOT ROW
    ────────────────────────────────────────────── */
    .form-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.32s both;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      user-select: none;
    }

    /* ── Custom checkbox ── */
    .remember input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      min-width: 16px;
      flex-shrink: 0;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      position: relative;
      transition: all 0.18s ease;
      margin: 0;
    }

    .remember input[type="checkbox"]:checked {
      background: var(--gold);
      border-color: var(--gold);
    }


    /* ── Tick: centred via inset+margin:auto ── */
    .remember input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      display: block;
      width: 5px;
      height: 8px;
      border: 2px solid #0f2847;
      border-top: none;
      border-left: none;
      transform: translateY(-1px) rotate(43deg);
      transform-origin: center;
    }

    .remember input[type="checkbox"]:focus-visible {
      outline: 2px solid rgba(201,168,76,0.6);
      outline-offset: 2px;
    }

    .remember span {
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .forgot {
      font-size: 0.8rem;
      color: rgba(201,168,76,0.65);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      line-height: 1;
    }
    .forgot:hover { color: var(--gold2); }

    /* ──────────────────────────────────────────────
       LOGIN BUTTON
    ────────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #c9a84c 0%, #e8c96a 50%, #c9a84c 100%);
      background-size: 200% 100%;
      color: #0f2847;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow:
        0 6px 24px rgba(201,168,76,0.3),
        0 2px 0 rgba(255,255,255,0.15) inset;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.36s both;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn-login:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201,168,76,0.4), 0 2px 0 rgba(255,255,255,0.2) inset;
    }

    .btn-login:hover::before { transform: translateX(100%); }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(201,168,76,0.25);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Spinner inside button */
    .btn-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15,40,71,0.3);
      border-top-color: #0f2847;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ──────────────────────────────────────────────
       ALERT
    ────────────────────────────────────────────── */
    #alertContainer {
      margin-bottom: 20px;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      border: 1px solid;
    }

    .alert-error {
      background: rgba(255,107,107,0.12);
      border-color: rgba(255,107,107,0.3);
      color: #ffaaaa;
    }

    .alert-success {
      background: rgba(74,222,128,0.1);
      border-color: rgba(74,222,128,0.3);
      color: #86efac;
    }

    /* ──────────────────────────────────────────────
       FOOTER
    ────────────────────────────────────────────── */
    .card-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.07);
      text-align: center;
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
    }

    .card-footer p {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      line-height: 1.9;
    }

    .card-footer .contact-link {
      color: rgba(201,168,76,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .card-footer .contact-link:hover { color: var(--gold); }

    /* ──────────────────────────────────────────────
       BOTTOM TAGLINE (outside card)
    ────────────────────────────────────────────── */
    .below-card {
      text-align: center;
      margin-top: 20px;
      animation: riseIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    .below-card p {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ──────────────────────────────────────────────
       RESPONSIVE
    ────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .login-scene { padding: 16px; }
      .login-card  { padding: 36px 28px 32px; }
      .headline h1 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>

  <!-- ── BACKGROUND ── -->
  <div class="bg-canvas">
    <div class="stars"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── CARD ── -->
  <div class="login-scene">
    <div class="login-card">

      <!-- Crest -->
      <div class="crest">
        <div class="crest-ring">
          <span class="crest-icon">🕊️</span>
        </div>
      </div>

      <!-- Headline -->
      <div class="headline">
        <h1>Little Angels Academy</h1>
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-diamond"></div>
          <div class="divider-line right"></div>
        </div>
        <p class="motto">Quality Education · Service · Discipline</p>
      </div>

      <!-- Alert -->
      <div id="alertContainer"></div>

      <!-- Form -->
      <form id="loginForm" autocomplete="on">

        <div class="form-group">
          <label class="field-label" for="email">Email Address</label>
          <div class="field-wrap">
            <div class="field-icon">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V4z" stroke="white" stroke-width="1.2"/>
                <path d="M1 4l7 5 7-5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </div>
            <input
              type="email"
              id="email"
              class="field-input"
              placeholder="your@email.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <div class="field-icon">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="7" width="12" height="8" rx="2" stroke="white" stroke-width="1.2"/>
                <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="8" cy="11" r="1.2" fill="white"/>
              </svg>
            </div>
            <input
              type="password"
              id="password"
              class="field-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 16 16" fill="none">
                <ellipse cx="8" cy="8" rx="6" ry="4" stroke="white" stroke-width="1.2"/>
                <circle cx="8" cy="8" r="1.8" fill="white"/>
              </svg>
            </button>
          </div>
        </div>

  <script type="module">
    import { supabase } from "./js/supabase.js";

    /* ── Password visibility toggle ── */
    const pwdInput  = document.getElementById('password');
    const pwdToggle = document.getElementById('pwdToggle');
    const eyeIcon   = document.getElementById('eyeIcon');

    pwdToggle.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      pwdToggle.style.opacity = isHidden ? '0.7' : '0.35';
      eyeIcon.innerHTML = isHidden
        ? `<ellipse cx="8" cy="8" rx="6" ry="4" stroke="white" stroke-width="1.2"/>
           <line x1="2" y1="2" x2="14" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round"/>`
        : `<ellipse cx="8" cy="8" rx="6" ry="4" stroke="white" stroke-width="1.2"/>
           <circle cx="8" cy="8" r="1.8" fill="white"/>`;
    });

    /* ── Alert helper ── */
    function showAlert(message, type = 'error') {
      const container = document.getElementById('alertContainer');
      container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => { container.innerHTML = ''; }, 5000);
    }

    /* ── Button loading state ── */
    const loginBtn = document.getElementById('loginBtn');
    const btnText  = document.getElementById('btnText');

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.querySelector('.btn-content').innerHTML = loading
        ? `<div class="btn-spinner"></div><span>Signing in…</span>`
        : `<span>Login</span>`;
    }

    /* ── Form submit ── */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      setLoading(true);

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          showAlert(error.message);
          setLoading(false);
        } else {
          showAlert('Welcome back! Redirecting…', 'success');
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 700);
        }
      } catch (err) {
        showAlert('An unexpected error occurred. Please try again.');
        setLoading(false);
      }
    });

    /* ── Check existing session ── */
    async function checkExistingSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) window.location.href = '/dashboard.html';
    }

    checkExistingSession();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/pwa/service-worker.js')
        .then(() => console.log('✓ Service Worker Registered'))
        .catch(err => console.error('✗ Service Worker Error:', err));
    }
  </script>
